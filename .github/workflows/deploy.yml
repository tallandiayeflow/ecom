name: 🚀 Deploy Backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'  # Déclenche uniquement si le backend change
  workflow_dispatch:  # Permet de déclencher manuellement

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy Backend to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e  # Arrêter en cas d'erreur
            
            echo "════════════════════════════════════════════════════════"
            echo "🚀 DÉPLOIEMENT BACKEND - $(date)"
            echo "════════════════════════════════════════════════════════"
            
            # Naviguer vers le dossier
            cd /home/seneauto/app || exit 1
            
            # Sauvegarder les fichiers critiques
            echo "📦 Sauvegarde des fichiers sensibles..."
            if [ -f backend/.env ]; then
              cp backend/.env backend/.env.backup
              echo "✅ .env sauvegardé"
            fi
            
            if [ -d backend/uploads ]; then
              echo "✅ Dossier uploads préservé"
            fi
            
            # Pull les changements
            echo ""
            echo "📥 Récupération des changements depuis GitHub..."
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code mis à jour"
            
            # Restaurer .env
            if [ -f backend/.env.backup ]; then
              mv backend/.env.backup backend/.env
              echo "✅ .env restauré"
            fi
            
            # Naviguer dans le backend
            cd backend || exit 1
            
            # Activer l'environnement virtuel
            echo ""
            echo "🐍 Activation de l'environnement virtuel..."
            source venv/bin/activate || exit 1
            
            # Installer/Mettre à jour les dépendances
            echo ""
            echo "📦 Installation des dépendances..."
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet
            echo "✅ Dépendances installées"
            
            # Vérifier la syntaxe Python
            echo ""
            echo "🔍 Vérification de la syntaxe..."
            python -m py_compile app.py
            echo "✅ Syntaxe correcte"
            
            # Redémarrer le service
            echo ""
            echo "🔄 Redémarrage du service..."
            sudo supervisorctl restart seneauto
            sleep 3
            
            # Vérifier le statut
            echo ""
            echo "📊 Statut du service:"
            sudo supervisorctl status seneauto
            
            # Vérifier les logs récents
            echo ""
            echo "📝 Dernières lignes des logs:"
            tail -n 20 /home/seneauto/app/backend/logs/gunicorn-error.log || echo "⚠️ Logs non disponibles"
            
            echo ""
            echo "════════════════════════════════════════════════════════"
            echo "✅ DÉPLOIEMENT TERMINÉ AVEC SUCCÈS - $(date)"
            echo "════════════════════════════════════════════════════════"

      - name: 📊 Deployment Status
        if: success()
        run: |
          echo "✅ Backend déployé avec succès sur le VPS"
          echo "🌐 API disponible sur: https://seneauto.duckdns.org"

      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "❌ Le déploiement a échoué"
          echo "Vérifiez les logs ci-dessus pour plus de détails"
